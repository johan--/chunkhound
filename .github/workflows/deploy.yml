name: Deploy Site

on:
  workflow_run:
    workflows: ["Tests"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # Path A: Download pre-built artifact from Tests workflow run
      # (triggered by workflow_run — Tests already built and verified the site)
      - uses: actions/download-artifact@v4
        if: github.event_name == 'workflow_run'
        with:
          name: site-dist
          path: site/dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      # Path B: Full build from scratch (workflow_dispatch fallback)
      - uses: actions/checkout@v6
        if: github.event_name != 'workflow_run'
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        if: github.event_name != 'workflow_run'
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Resolve docs version
        if: github.event_name != 'workflow_run'
        run: bash scripts/resolve_docs_version.sh
      - run: npm ci --prefix site
        if: github.event_name != 'workflow_run'
      - run: npm run build --prefix site
        if: github.event_name != 'workflow_run'

      # Common steps
      - name: Create .nojekyll sentinel
        run: touch site/dist/.nojekyll

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist/

      - id: deployment
        uses: actions/deploy-pages@v5
