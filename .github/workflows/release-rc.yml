name: RC Release

on:
  push:
    tags:
      - 'v*rc*'  # e.g. v1.2.0rc1 (PEP 440 release candidate)
      - 'v*b*'   # e.g. v1.2.0b1  (PEP 440 beta)
      - 'v*a*'   # e.g. v1.2.0a1  (PEP 440 alpha)
      # tag push by maintainer is the human gate (protected via tag ruleset)

permissions:
  id-token: write  # OIDC Trusted Publishing

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15

    steps:
      - name: Validate pre-release tag format (PEP 440)
        shell: python
        run: |
          import re, sys
          tag = "${{ github.ref_name }}"
          if not re.match(r'^v\d+\.\d+\.\d+(a|b|rc)\d+$', tag):
              print(f"::error::Tag {tag!r} is not a valid PEP 440 pre-release (expected vX.Y.Z(a|b|rc)N)")
              sys.exit(1)

  build-sdist:
    needs: validate-tag
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs requires full history for version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build source distribution
        run: uv build --sdist --out-dir dist

      - name: Upload source distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-rc-dist-sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  build-runtime-wheels:
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # hatch-vcs requires full history for version derivation

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Build packaged Watchman runtime wheel
        env:
          CHUNKHOUND_BUILD_PACKAGED_WATCHMAN_RUNTIME: "1"
        run: uv build --wheel --clear

      - name: Upload runtime wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-rc-dist-${{ matrix.os }}
          path: dist/*.whl
          if-no-files-found: error

  publish-rc:
    needs: [build-sdist, build-runtime-wheels]
    runs-on: ubuntu-latest
    environment: pypi
    timeout-minutes: 15

    steps:
      - name: Download staged distribution artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: release-rc-dist-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          # No token needed — OIDC Trusted Publishing configured on PyPI project
